keys:
  - &aorus_host age1placeholder_replace_with_real_host_key_aorus
  - &surface_host age1placeholder_replace_with_real_host_key_surface

creation_rules:
  - path_regex: secrets/secrets\.yaml$
    key_groups:
      - age:
          - *aorus_host
          - *surface_host
  - path_regex: secrets/rclone\.yaml$
    key_groups:
      - age:
          - *aorus_host
          - *surface_host