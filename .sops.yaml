# ── SOPS AGE KEY CONFIGURATION ──────────────────────────────────────────────
# IMPORTANT: Replace these placeholder values with real host keys during setup.
#   ssh-to-age < /etc/ssh/ssh_host_ed25519_key.pub
# Never commit real keys to a public repository.
keys:
  - &aorus_host AGE1PLACEHOLDER_REPLACE_WITH_REAL_HOST_KEY_DURING_INSTALL
  - &surface_host AGE1PLACEHOLDER_REPLACE_WITH_REAL_HOST_KEY_DURING_INSTALL

creation_rules:
  - path_regex: secrets/secrets\.yaml$
    key_groups:
      - age:
          - *aorus_host
          - *surface_host